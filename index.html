<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEU SFL - AI-Shield & Mentor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>İZMİR EKONOMİ ÜNİVERSİTESİ</h1>
            <p>SFL AI-Shield: Akademik Dürüstlük ve Denetim Sistemi</p>
        </div>
    </header>

    <main class="dashboard">
        <section class="workspace">
            <div class="section-header">
                <h2>Öğrenci Yazım Alanı</h2>
                <div id="security-badge">🛡️ Güvenli Mod Aktif</div>
            </div>
            <p class="hint">Not: Dışarıdan metin yapıştırma engellenmiştir. Lütfen essayinizi buraya yazınız.</p>
            <textarea id="essayInput" placeholder="Akademik metninizi yazmaya başlayın..." onpaste="return false;"></textarea>
            <button onclick="analyzeWithSecurity()" id="analyzeBtn">Güvenli Analizi Başlat</button>
        </section>

        <section class="analysis">
            <h2>Denetim ve Geri Bildirim Paneli</h2>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Yapay Zeka dürüstlük ve müfredat denetimi yapıyor...</p>
            </div>
            <div id="security-report" class="security-box hidden"></div>
            <div id="results" class="results-container"></div>
            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
